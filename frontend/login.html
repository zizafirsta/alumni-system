<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Alumni System</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="error" id="error"></p>
</div>

<script>
    const SUPABASE_URL = "https://ebhbpaxdpifelnxixgfy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViaGJwYXhkcGlmZWxueGl4Z2Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTE3NzksImV4cCI6MjA5MDgyNzc3OX0.H6NTHRDu0HMXBBNbQjg2uJGnxqJbPqJYNWBlTpn00Eo";

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { data, error } = await client.auth.signInWithPassword({
            email: email,
            password: password
        });

        console.log("LOGIN RESULT:", data, error);

        if (error) {
            document.getElementById("error").innerText = error.message;
        } else {
            window.location.href = "dashboard.html";
        }
    }
</script>

</body>
</html>
